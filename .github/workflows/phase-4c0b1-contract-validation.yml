name: phase-4c0b1-contract-validation

on:
  pull_request:
    paths:
      - "infra/terraform/modules/document-encryption/**"
      - "infra/terraform/modules/document-storage/**"
      - "infra/terraform/stacks/document-platform/**"
      - "docs/adr/0012-terraform-industrialization-model.md"
      - "docs/architecture/phase-4c0-terraform-industrialization-plan.md"
      - "docs/architecture/phase-4c0b1-encryption-storage.md"
      - ".github/workflows/infrastructure-validation.yml"
      - ".github/workflows/phase-4c0b1-contract-validation.yml"
  push:
    branches:
      - main
      - "feature/**"
    paths:
      - "infra/terraform/modules/document-encryption/**"
      - "infra/terraform/modules/document-storage/**"
      - "infra/terraform/stacks/document-platform/**"
      - "docs/adr/0012-terraform-industrialization-model.md"
      - "docs/architecture/phase-4c0-terraform-industrialization-plan.md"
      - "docs/architecture/phase-4c0b1-encryption-storage.md"
      - ".github/workflows/infrastructure-validation.yml"
      - ".github/workflows/phase-4c0b1-contract-validation.yml"

permissions:
  contents: read

jobs:
  contract-guardrails:
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Verify accepted architecture and migration contracts
        shell: bash
        run: |
          set -euo pipefail
          adr="docs/adr/0012-terraform-industrialization-model.md"
          plan="docs/architecture/phase-4c0-terraform-industrialization-plan.md"
          stack="infra/terraform/stacks/document-platform"
          stack_outputs="${stack}/outputs.tf"
          stack_tests="${stack}/tests/document_platform.tftest.hcl"
          encryption="infra/terraform/modules/document-encryption"
          storage="infra/terraform/modules/document-storage"
          storage_tests="${storage}/tests/document_storage.tftest.hcl"
          infrastructure_workflow=".github/workflows/infrastructure-validation.yml"

          grep -q --fixed-strings -- "- Status: Accepted" "${adr}"
          grep -q --fixed-strings -- "- Accepted through PR #11 on 2026-07-16" "${adr}"
          test "$(wc -l < "${adr}")" -ge 320
          grep -q --fixed-strings "### State and blast-radius boundaries" "${adr}"
          grep -q --fixed-strings "### Validation and policy as code" "${adr}"
          grep -q --fixed-strings "### Migration from Phase 4B" "${adr}"
          grep -q --fixed-strings "## Alternatives considered" "${adr}"
          grep -q --fixed-strings "## Consequences" "${adr}"
          grep -q --fixed-strings "## Required follow-up" "${adr}"
          grep -q --fixed-strings "ADR-0012 was reviewed and accepted through PR #11" "${adr}"

          grep -q --fixed-strings "ADR-0012 \`Accepted\`" "${plan}"
          grep -q --fixed-strings "Current implementation gate: 4C-0B1 only" "${plan}"
          grep -q --fixed-strings "Live ownership cutover: forbidden before 4C-0B3" "${plan}"
          test "$(wc -l < "${plan}")" -ge 600
          grep -q --fixed-strings "## Mandatory state-discovery gate" "${plan}"
          grep -q --fixed-strings "## Current-to-target resource address map" "${plan}"
          grep -q --fixed-strings "### Plan JSON policies" "${plan}"
          grep -q --fixed-strings "## Rollback" "${plan}"
          if grep -q --fixed-strings 'ADR-0012 remains `Proposed`' "${plan}"; then
            echo "The migration plan must not contradict the accepted ADR status" >&2
            exit 1
          fi

          compatibility_module="$(sed -n '/^module "encryption" {/,/^}/p' "${stack}/main.tf")"
          if grep -q --fixed-strings "for_each" <<<"${compatibility_module}"; then
            echo "The compatibility encryption module must remain a singleton for the approved migration address" >&2
            exit 1
          fi

          grep -q --fixed-strings 'module "capability_encryption"' "${stack}/main.tf"
          grep -q --fixed-strings 'for_each = local.capability_encryption_contracts' "${stack}/main.tf"
          grep -q --fixed-strings 'contract != null' "${stack}/context.tf"
          grep -q --fixed-strings 'must not redefine mandatory platform tag keys' "${stack}/variables.tf"
          grep -q --fixed-strings 'value       = module.storage.encryption.kms_key_arn' "${stack_outputs}"
          grep -q --fixed-strings 'run "explicit_null_overrides_resolve_compatibility_default"' "${stack_tests}"
          grep -q --fixed-strings 'output.document_kms_key_arn == "arn:aws:kms:eu-west-3:123456789012:key/11111111-2222-3333-4444-555555555555"' "${stack_tests}"

          for readme in "${encryption}/README.md" "${storage}/README.md" "${stack}/README.md"; do
            grep -q --fixed-strings "Contract version:" "${readme}"
            grep -q --fixed-strings "## Interface contract" "${readme}"
          done

          for versions_file in "${encryption}/versions.tf" "${storage}/versions.tf" "${stack}/versions.tf"; do
            grep -q --fixed-strings 'version = ">= 6.55.0, < 7.0.0"' "${versions_file}"
          done

          grep -q --fixed-strings 'alias/iaagents-dev-document-data' "${stack}/tests/compatibility_kms.tftest.hcl"
          grep -q --fixed-strings 'expect_failures = [var.context]' "${stack}/tests/mandatory_tags.tftest.hcl"

          grep -q --fixed-strings 'override_during = plan' "${storage_tests}"
          grep -q --fixed-strings 'jsondecode(aws_s3_bucket_policy.this.policy)' "${storage_tests}"
          grep -q --fixed-strings 'length(jsondecode(aws_s3_bucket_policy.this.policy).Statement) == 3' "${storage_tests}"
          grep -q --fixed-strings 'length(jsondecode(aws_s3_bucket_policy.this.policy).Statement) == 4' "${storage_tests}"
          for sid in DenyInsecureTransport DenyMissingEncryptionHeader DenyIncorrectEncryptionMode DenyIncorrectKmsKey; do
            grep -q --fixed-strings "${sid}" "${storage_tests}"
          done
          grep -q --fixed-strings 'aws:SecureTransport' "${storage_tests}"
          grep -q --fixed-strings 's3:x-amz-server-side-encryption-aws-kms-key-id' "${storage_tests}"

          grep -q --fixed-strings 'active_root_dir="infra/terraform/environments/dev"' "${infrastructure_workflow}"
          grep -q --fixed-strings "grep -R --include='*.tf'" "${infrastructure_workflow}"
          grep -q --fixed-strings "moved[[:space:]]*\\{" "${infrastructure_workflow}"
          if grep -q --fixed-strings "find infra/terraform -name 'moved.tf'" "${infrastructure_workflow}"; then
            echo "Ownership validation must not depend on a moved.tf filename" >&2
            exit 1
          fi
