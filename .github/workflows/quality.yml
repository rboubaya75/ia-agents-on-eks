name: quality

on:
  pull_request:
  push:
    branches:
      - main
      - "feature/**"

permissions:
  contents: read

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-quality:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install --disable-pip-version-check "uv==0.10.0"

      - name: Install dependencies
        run: uv sync

      - name: Ruff lint
        run: uv run ruff check packages apps tests

      - name: Ruff format check
        run: uv run ruff format --check packages apps tests

      - name: Mypy strict
        run: uv run mypy

      - name: Tests
        run: uv run pytest
