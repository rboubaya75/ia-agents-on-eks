name: infrastructure-validation

on:
  pull_request:
    paths:
      - "infra/**"
      - ".gitignore"
      - "docs/adr/0011-document-infrastructure-and-deployment.md"
      - "docs/architecture/phase-4-document-infrastructure-plan.md"
      - "docs/architecture/phase-4b-document-data-plane.md"
      - ".github/workflows/infrastructure-validation.yml"
  push:
    branches:
      - main
      - "feature/**"
    paths:
      - "infra/**"
      - ".gitignore"
      - "docs/adr/0011-document-infrastructure-and-deployment.md"
      - "docs/architecture/phase-4-document-infrastructure-plan.md"
      - "docs/architecture/phase-4b-document-data-plane.md"
      - ".github/workflows/infrastructure-validation.yml"

permissions:
  contents: read

concurrency:
  group: infrastructure-validation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  terraform-document-data-plane:
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: 1.15.8
          terraform_wrapper: false

      - name: Generate canonical Terraform formatting
        run: terraform fmt -recursive infra/terraform

      - name: Upload canonically formatted Terraform
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: canonically-formatted-terraform
          path: infra/terraform
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 1

      - name: Verify Terraform formatting
        run: git diff --exit-code -- infra/terraform

      - name: Initialize module
        working-directory: infra/terraform/modules/document-data-plane
        run: terraform init -backend=false -input=false

      - name: Validate module
        working-directory: infra/terraform/modules/document-data-plane
        run: terraform validate

      - name: Test module
        id: terraform_test
        working-directory: infra/terraform/modules/document-data-plane
        shell: bash
        run: |
          set -o pipefail
          terraform test -no-color 2>&1 | tee terraform-test.log

      - name: Initialize development composition
        working-directory: infra/terraform/environments/dev
        run: terraform init -backend=false -input=false -lockfile=readonly

      - name: Validate development composition
        working-directory: infra/terraform/environments/dev
        run: terraform validate

      - name: Verify committed provider lock
        shell: bash
        run: |
          set -euo pipefail
          lock_file="infra/terraform/environments/dev/.terraform.lock.hcl"
          test -f "${lock_file}"
          git diff --exit-code -- "${lock_file}"
          test -z "$(git status --porcelain -- "${lock_file}")"

      - name: Static document data-plane guardrails
        shell: bash
        run: |
          set -euo pipefail
          module="infra/terraform/modules/document-data-plane"

          if grep -R --line-number --fixed-strings --include='*.tf' "force_destroy = true" "${module}"; then
            echo "force_destroy=true is forbidden for durable document resources" >&2
            exit 1
          fi

          for file in dynamodb.tf kms.tf s3.tf s3vectors.tf; do
            grep -q --fixed-strings "prevent_destroy = true" "${module}/${file}"
          done

          grep -q --fixed-strings 'redrive_policy = jsonencode({' "${module}/sqs.tf"
          grep -q --fixed-strings 'resource "aws_sqs_queue_redrive_allow_policy"' "${module}/sqs.tf"

          if grep -R --line-number -E 'arn:(aws|aws-us-gov|aws-cn):' "${module}" --include='*.tf'; then
            echo "Committed AWS ARNs are forbidden in the reusable module" >&2
            exit 1
          fi

      - name: Upload Terraform test failure log
        if: failure() && steps.terraform_test.outcome == 'failure'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: terraform-test-failure-log
          path: infra/terraform/modules/document-data-plane/terraform-test.log
          if-no-files-found: error
          retention-days: 7
