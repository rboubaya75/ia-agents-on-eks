[build-system]
requires = ["hatchling==1.27.0"]
build-backend = "hatchling.build"

[project]
name = "ia-aws-clients"
version = "0.1.0"
requires-python = ">=3.12,<3.13"
dependencies = [
  "boto3==1.43.18",
  "ia-application",
  "ia-domain",
]

[tool.hatch.build.targets.wheel]
packages = ["src/ia_aws_clients"]
